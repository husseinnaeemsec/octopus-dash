<td class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 flex gap-2 items-center relative">
    <button data-id="actions_menu_{{ obj.id }}"  class=" toggle-menu-btn text-center flex items-center justify-center w-full">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z" />
        </svg>
    </button>

    <!-- Actions Menu -->
    <div id="actions_menu_{{ obj.id }}" class=" actions-menu hidden min-w-fit top-[110%] bg-gray-800  h-fit rounded absolute right-4 z-10">
        <div class="space-y-3 items-center p-2 text-sm text-sm bg-gray-100 dark:bg-gray-800 rounded-md h-fit text-gray-600 dark:text-gray-200">

            <!-- Edit Profile -->
            <a href="{% url 'octopusdash-update-user' obj.pk %}" class="p-3 flex items-center gap-3 hover:bg-gray-200 dark:hover:bg-gray-900 rounded-md">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                </svg>
                Edit User
            </a>

            <!-- Manage Permissions -->
            <a href="#" class="p-3 flex items-center gap-3 hover:bg-gray-200 dark:hover:bg-gray-900 rounded-md">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Manage Permissions
            </a>

            <!-- Send Email -->
            <a href="#" class="p-3 flex items-center gap-3 hover:bg-gray-200 dark:hover:bg-gray-900 rounded-md">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25H4.5a2.25 2.25 0 0 1-2.25-2.25V6.75m0 0l10.5 6.75 10.5-6.75M2.25 6.75L12 13.5l9.75-6.75" />
                </svg>
                Send Email
            </a>

            <!-- Delete User -->
            <a href="#" class="p-3 flex items-center gap-3 hover:bg-red-100 dark:hover:bg-red-900 rounded-md text-rose-500 dark:text-rose-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M6 18L18 6M6 6l12 12" />
                </svg>
                Delete User
            </a>

        </div>
    </div>
    <!-- End actions menu  -->
</td>
