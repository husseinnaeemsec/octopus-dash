<div class="overflow-x-auto p-4 w-full">
    {% for obj in page_obj  %}
    <div class="p-3 text-gray-400 hover:text-gray-100 hover:bg-gray-900 bg-gray-900/50 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <label class="inline-flex items-center space-x-2 cursor-pointer">
                <input type="checkbox" class="peer hidden" />
                <div
                    class="w-4 h-4 rounded border-2 border-gray-600 bg-gray-900 peer-checked:bg-indigo-500 transition-colors duration-200 flex items-center justify-center">
                    <!-- Check icon -->
                    <svg class="w-2 h-2 text-white hidden peer-checked:block" fill="none" stroke="currentColor"
                        stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </label>

            <a href="" class="underline ">  {{obj}}  </a>
        </div>
    </div>
    {% endfor %}
        
</div>
