{% load static %}
{% load octopus_tags %}
<!-- octopusDash/templates/octopusDash/partials/sidebar.html -->
<aside id="octopus_sidebar" class="p-4 bg-gray-900/30 lg:sticky top-0 fixed w-full h-screen ">
    <!-- Logo -->
    <div class="flex p-3 items-center justify-between gap-3 my-3">
        <div class="flex gap-3 items-center">
            <img src="{% static 'octopusdash/logo/64.svg' %}" class="lg:w-12 lg:h-12 h-14 w-14" alt="">
            <h1
                class="lg:text-xl text-2xl font-bold bg-gradient-to-r from-purple-600 to-indigo-500 text-transparent bg-clip-text">
                Octopusdash
            </h1>
        </div>
        <button id="close-sidebar" class="lg:hidden">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-8 text-gray-400">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        </button>
    </div>

<!-- Menu items -->
<ul class="text-gray-400 p-3 mt-5 space-y-4">
<!-- Dashboard -->
<a href="{% url 'octopusdash-dashboard' %}"
    class="flex items-center gap-3 p-3 text-indigo-50 bg-gradient-to-r  {% if request.path == '/dashboard/' %} from-indigo-500 to-indigo-700 {% endif %}  rounded-lg">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
        stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round"
            d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
    </svg>
    <span> Dashboard </span>
</a>
<!-- Applications List  -->
<a href="{% url 'octopusdash-apps_list' %}"
    class="flex items-center gap-3 p-3 text-indigo-50 bg-gradient-to-r {% if request.path == '/dashboard/apps/' %} from-indigo-500 to-indigo-700 {% endif %}  hover:bg-gray-900 rounded-lg">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
    </svg>
    
    <span> Apps </span>
</a>
<!-- User management -->
<a href="#users" class="flex items-center gap-3 rounded-lg p-3 hover:bg-gray-900">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
        stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round"
            d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
    </svg>
    <span> User management </span>
</a>

<!-- Projects -->
<a href="#projects" class="flex items-center gap-3 rounded-lg p-3 hover:bg-gray-900">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
        stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round"
            d="M3.75 4.5l.5 13.25c.03.8.676 1.5 1.5 1.5h13c.824 0 1.47-.7 1.5-1.5l.5-13.25M3.75 4.5H20.25M3.75 4.5l1.5-1.5h13.5l1.5 1.5" />
    </svg>
    <span> Projects </span>
</a>

<!-- Reports -->
<a href="#reports" class="flex items-center gap-3 rounded-lg p-3 hover:bg-gray-900">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
        stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 17v-6m6 6V9m-9 9V9a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v9" />
    </svg>
    <span> Reports </span>
</a>

<!-- Notifications -->
<a href="#notifications" class="flex items-center gap-3 rounded-lg p-3 hover:bg-gray-900">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
        stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 17h5.25M4.5 17H9.75M6.75 10.5a3.75 3.75 0 0 1 7.5 0V12m-7.5 0h7.5M15 12a3.75 3.75 0 0 0 3.75 3.75" />
    </svg>
    <span> Notifications </span>
</a>

<!-- Settings -->
<a href="#settings" class="flex items-center gap-3 rounded-lg p-3 hover:bg-gray-900">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
        stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 4.5v1.125M6.364 6.364l.796.796M3.75 12h1.125m0 4.95l-.796.796M12 21v-1.125M17.636 17.636l-.796-.796M20.25 12h-1.125M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18Z" />
    </svg>
    <span> Settings </span>
</a>

<!-- Analytics -->
<a href="#analytics" class="flex items-center gap-3 rounded-lg p-3 hover:bg-gray-900">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
        stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round"
            d="M4.5 12.75l6-6 4.5 4.5L20.25 6M3.75 21h16.5" />
    </svg>
    <span> Analytics </span>
</a>
</ul>

</aside>

<script>
    const sidebar = document.getElementById("octopus_sidebar")


    document.getElementById("close-sidebar").addEventListener("click", () => {
        gsap.to(sidebar, {
            right: '-100%'
        })
    })
    


</script>
