{% load i18n %}

<div class="space-y-2">
    {% if field.errors %}
    <ul class="space-y-2 text-rose-500">
        {% for error in field.errors %}
        <li>{% blocktrans %}{{ error }}{% endblocktrans %}</li>
        {% endfor %}
    </ul>
    {% endif %}
    
    <label class="text-slate-500" for="{{ field.id_for_label }}">
        {{ field.label }}
        {% if field.field.required %} 
            <strong class="text-rose-500">*</strong> 
        {% endif %}
    </label>

    <textarea
        class="w-full border rounded p-2 px-5"
        name="{{ field.name }}"
        data-tooltip="{{ field.help_text|default:'No additional info' }}"
        aria-label=""
        rows="5"
        aria-invalid="{% if field.errors %}true{% else %}false{% endif %}"
        maxlength="{{ metadata.widget.attrs.maxlength }}"
        placeholder="{{ metadata.widget.attrs.placeholder }}"
    >{% if field.value %}{{ field.value }}{% endif %}</textarea>
</div>

<script>
    var quill = new Quill('.textarea-widget', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': '1' }, { 'header': '2' }, { 'font': [] }],
                [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                ['bold', 'italic', 'underline'],
                [{ 'align': [] }],
                ['link']
            ]
        }
    });
</script>
