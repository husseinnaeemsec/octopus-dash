<div class="p-6 bg-gray-900 rounded-lg shadow-lg hover:shadow-2xl transition-all mx-auto w-full max-w-3xl">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-semibold text-green-300">{{ widget_title }}</h3>
        <span class="px-3 py-1 text-xs font-semibold text-gray-900 bg-green-400 rounded-full">API</span>
    </div>

    <canvas id="chartWidget" class="h-64 w-full"></canvas>

    <div class="mt-4 flex justify-between text-sm text-gray-400">
        <span>Last updated: {{ last_updated }}</span>
        <button class="text-green-400 hover:text-green-500 transition-all">View Details</button>
    </div>
</div>

<script>
    const config = JSON.parse(`{{ chart_config|escapejs }}`);
    const dynamicctx = document.getElementById('chartWidget').getContext('2d');
    new Chart(dynamicctx, config);
</script>
