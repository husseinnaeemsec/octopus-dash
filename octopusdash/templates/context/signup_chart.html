<div class="p-6 bg-gray-900 rounded-lg shadow-lg hover:shadow-2xl transition-all mx-auto max-h-full">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-semibold text-yellow-300">Signup Conversion</h3>
        <span class="px-3 py-1 text-xs font-semibold text-gray-900 bg-yellow-400 rounded-full">Signups</span>
    </div>

    <!-- Doughnut Chart Widget -->
    <div class="w-full">
        <canvas id="signupChart" class="w-full"></canvas>
    </div>

    <!-- Widget Footer -->
    <div class="mt-4 flex justify-between text-sm text-gray-400">
        <span>Updated: 1 hour ago</span>
        <button class="text-yellow-400 hover:text-yellow-500 transition-all">View Details</button>
    </div>
</div>

<script>
    const signupCtx = document.getElementById('signupChart').getContext('2d');
    const signupChart = new Chart(signupCtx, {
        type: 'doughnut',
        data: {
            labels: ['Signed Up', 'Did Not Signup'],
            datasets: [{
                label: 'Conversion Rate',
                data: [320, 680],
                backgroundColor: [
                    'rgba(253, 224, 71, 0.8)', // Yellow
                    'rgba(75, 85, 99, 0.4)'    // Gray
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        color: 'white'
                    }
                }
            }
        }
    });
</script>
