<nav aria-label="breadcrumb" class="my-y mb-10">
    <ol class="flex space-x-2 text-sm text-gray-200">
        {% for part in path %}
        <li class="flex items-center">
            {% if not forloop.last %}
            <a href="{{ part.url }}" class="text-gray-400 hover:text-gray-300 transition-colors">{{ part.name }}</a>
            <span class="mx-2 text-gray-400">/</span>
            {% else %}
            <span class="font-semibold text-gray-100">{{ part.name }}</span>
            
            {% endif %}
        </li>
        {% endfor %}
    </ol>
</nav>
